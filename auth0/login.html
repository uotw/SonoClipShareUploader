<!DOCTYPE html>
<html>
   <head>
      <meta charset="utf-8">
      <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
      <title>Sign In with Auth0</title>
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <link href="https://fonts.googleapis.com/css?family=Roboto" rel="stylesheet">
      <style>
        .auth0-lock-badge-bottom { display:none }
        .auth0-lock-name { font-size:18px !important }
        .auth0-lock.auth0-lock { z-index:100 !important; }
        .auth0-lock-social-button-icon { background-size: 97% !important; }
        .auth0-lock-social-button-text { font-family: 'Roboto', sans-serif !important; }
        /* Modern floating "update available" toast */
        #nah { text-decoration: none; }
        #popovermessage {
          position: fixed;
          top: 18px;
          left: 50%;
          z-index: 500;
          display: flex;
          align-items: center;
          gap: 12px;
          max-width: 92%;
          padding: 11px 14px 11px 20px;
          border-radius: 14px;
          background: linear-gradient(135deg, #2563eb 0%, #1e3a8a 100%);
          color: #fff;
          font-family: 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif;
          font-size: 15px;
          font-weight: 600;
          letter-spacing: .2px;
          white-space: nowrap;
          box-shadow: 0 12px 30px rgba(30, 58, 138, .35), 0 2px 6px rgba(0, 0, 0, .18);
          cursor: pointer;
          /* hidden until JS adds .show */
          opacity: 0;
          transform: translateX(-50%) translateY(-26px);
          pointer-events: none;
          transition: opacity .45s cubic-bezier(.22, 1, .36, 1),
                      transform .45s cubic-bezier(.22, 1, .36, 1),
                      box-shadow .2s ease;
        }
        #popovermessage.show {
          opacity: 1;
          transform: translateX(-50%) translateY(0);
          pointer-events: auto;
        }
        #popovermessage.show:hover {
          transform: translateX(-50%) translateY(-2px);
          box-shadow: 0 16px 38px rgba(30, 58, 138, .45), 0 3px 8px rgba(0, 0, 0, .2);
        }
        #popovermessage .dl-icon { flex: none; }
        #popovermessage .cta {
          flex: none;
          padding: 4px 13px;
          border-radius: 999px;
          background: rgba(255, 255, 255, .18);
          font-size: 13px;
          font-weight: 700;
        }
      </style>
   </head>
   <body>
      <a href="https://github.com/uotw/SonoClipShareUploader#download" id="nah" target="_blank">
        <div id="popovermessage"><svg class="dl-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg><span>A new version of the Uploader is available</span><span class="cta">Update&nbsp;→</span></div>
      </a>

      <script src="https://cdn.auth0.com/js/lock/11.3/lock.min.js"></script>

      <script>
        // ------------------------------------------------------------------
        // Compare two dotted version strings. Returns -1 (v1<v2), 0, or 1.
        // (from http://stackoverflow.com/a/6832721)
        // ------------------------------------------------------------------
        function versionCompare(v1, v2, options) {
          var lexicographical = (options && options.lexicographical) || false,
              zeroExtend = (options && options.zeroExtend) || true,
              v1parts = (v1 || "0").split('.'),
              v2parts = (v2 || "0").split('.');

          function isValidPart(x) {
            return (lexicographical ? /^\d+[A-Za-zαß]*$/ : /^\d+[A-Za-zαß]?$/).test(x);
          }
          if (!v1parts.every(isValidPart) || !v2parts.every(isValidPart)) return NaN;

          if (zeroExtend) {
            while (v1parts.length < v2parts.length) v1parts.push("0");
            while (v2parts.length < v1parts.length) v2parts.push("0");
          }
          if (!lexicographical) {
            v1parts = v1parts.map(Number);
            v2parts = v2parts.map(Number);
          }
          for (var i = 0; i < v1parts.length; ++i) {
            if (v2parts.length == i) return 1;
            if (v1parts[i] == v2parts[i]) continue;
            return v1parts[i] > v2parts[i] ? 1 : -1;
          }
          return v1parts.length != v2parts.length ? -1 : 0;
        }

        // Delegated event listener helper (used by the gmail nudge below).
        function addLiveEventListeners(selector, event, handler) {
          document.querySelector("body").addEventListener(event, function (evt) {
            var target = evt.target;
            while (target != null) {
              if (target.matches(selector)) { handler(evt); return; }
              target = target.parentElement;
            }
          }, true);
        }

        // ------------------------------------------------------------------
        // Detect the uploader app + its version from the User-Agent.
        // The Electron app loads this page with a UA like:
        //   "Chrome - SonoClipShareUploader/2.6.1"
        // ------------------------------------------------------------------
        var appVersion = null;
        (navigator.userAgent || '').split(' ').forEach(function (tok) {
          if (tok.indexOf('SonoClipShareUploader/') === 0) appVersion = tok.split('/')[1];
        });

        // Hide signup when logging in from inside the uploader app.
        var showsignup = !appVersion;

        // ------------------------------------------------------------------
        // Update banner: ask sonoclipshare.com for the latest released version
        // (kept current by the release CI — see server/appversion.php) and
        // compare to the running app version. No hardcoded version to maintain,
        // and no GitHub API rate limit. Fails silently (no banner) if the
        // endpoint is unreachable — never blocks login.
        // ------------------------------------------------------------------
        if (appVersion) {
          fetch('https://www.sonoclipshare.com/appversion.php')
            .then(function (r) { return r.ok ? r.json() : null; })
            .then(function (data) {
              if (!data || !data.version) return;
              var latest = String(data.version).replace(/^v/i, '');    // "2.6.2"
              if (versionCompare(appVersion, latest) === -1) {         // running older than latest
                var popover = document.getElementById('popovermessage');
                if (popover) popover.classList.add('show');
              }
            })
            .catch(function () { /* ignore — never block login on the update check */ });
        }

        // ------------------------------------------------------------------
        // Gmail users must use the Google button (password login disabled for them).
        // ------------------------------------------------------------------
        document.addEventListener("DOMContentLoaded", function () {
          addLiveEventListeners("input[type=email]", "keyup", function () {
            var emailinput = document.querySelectorAll('input[type=email]')[0];
            if (!emailinput) return;
            var emailsuff = (emailinput.value.split('@')[1] || '').toLowerCase();
            var sub = document.querySelectorAll('.auth0-lock-submit')[0];
            var subText = document.querySelectorAll('.auth0-label-submit')[0];
            if (!sub || !subText) return;

            if (emailsuff === "gmail.com") {
              sub.style.pointerEvents = "none";
              subText.style.color = "#717171";
              var button = document.getElementsByClassName('auth0-lock-social-button-text')[0];
              var label = button ? button.innerHTML.toUpperCase() : 'GOOGLE';
              alert('use the ' + label + ' button to login with gmail');
              window.location.reload();
            } else {
              sub.style.pointerEvents = "all";
              subText.style.color = "unset";
            }
          });
        });

        // ------------------------------------------------------------------
        // Auth0 Lock setup (unchanged behavior).
        // ------------------------------------------------------------------
        var config = JSON.parse(decodeURIComponent(escape(window.atob('@@config@@'))));
        config.extraParams = config.extraParams || {};
        var connection = config.connection;
        var prompt = config.prompt;
        var languageDictionary;
        var language;

        if (config.dict && config.dict.signin && config.dict.signin.title) {
          languageDictionary = { title: config.dict.signin.title };
        } else if (typeof config.dict === 'string') {
          language = config.dict;
        }
        var loginHint = config.extraParams.login_hint;

        var lock = new Auth0Lock(config.clientID, config.auth0Domain, {
          auth: {
            redirectUrl: config.callbackURL,
            responseType: (config.internalOptions || {}).response_type ||
              (config.callbackOnLocationHash ? 'token' : 'code'),
            params: config.internalOptions
          },
          allowSignUp: showsignup,
          assetsUrl: config.assetsUrl,
          allowedConnections: connection ? [connection] : null,
          rememberLastLogin: !prompt,
          language: language,
          languageDictionary: languageDictionary,
          theme: {
            logo: 'https://www.sonoclipshare.com/Logo150.png',
            primaryColor: '#2c2c2c',
            authButtons: {
              "google-oauth2": {
                displayName: "",
                primaryColor: "#4285F4",
                foregroundColor: "",
                icon: "https://www.sonoclipshare.com/btn_google_dark_normal_ios.jpg"
              }
            }
          },
          prefill: loginHint ? { email: loginHint, username: loginHint } : null,
          closable: false,
          defaultADUsernameFromEmailPrefix: false
        });

        lock.show();
      </script>
   </body>
</html>
